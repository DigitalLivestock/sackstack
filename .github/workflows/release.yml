name: Release

# Publishes a GitHub Release whenever a `vX.Y.Z` tag is pushed.
# Release notes are extracted from CHANGELOG.md for the matching version.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Pull the section between `## [VERSION]` and the next `## [` or end-of-file.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag && /^---$/ { next }
            flag { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for v$VERSION" >&2
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." > release_notes.md
          fi

          echo "--- release notes ---"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Sack Stack ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: false
